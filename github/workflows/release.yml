name: Build Windows MSI

on:
  push:
    branches: [ main, master ] # Сборка будет запускаться при пуше в эти ветки
  workflow_dispatch: # Позволяет запустить сборку вручную кнопкой в GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli

      - name: Build and Bundle MSI
        # Эта команда соберет проект и создаст установщик .msi
        run: dx bundle --release --platform windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # Путь к собранному пакету (Dioxus кладет их в target/dx)
          path: target/dx/*/release/windows/*.msi
          if-no-files-found: error
