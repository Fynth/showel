name: Build Windows Packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      package_type:
        description: 'Package type to build'
        required: true
        default: 'exe'
        type: choice
        options:
          - exe
          - msi
          - both
      release_tag:
        description: 'Existing release tag to upload assets into; optional'
        required: false
        type: string

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.ref }}

      - name: Resolve workflow metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag=""
          build_exe="false"
          build_msi="false"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
            build_exe="true"
          else
            release_tag="${{ github.event.inputs.release_tag }}"
            case "${{ github.event.inputs.package_type }}" in
              exe)
                build_exe="true"
                ;;
              msi)
                build_msi="true"
                ;;
              both)
                build_exe="true"
                build_msi="true"
                ;;
              *)
                echo "unsupported package_type: ${{ github.event.inputs.package_type }}" >&2
                exit 1
                ;;
            esac
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_exe=${build_exe}" >> "${GITHUB_OUTPUT}"
          echo "build_msi=${build_msi}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          default-host: x86_64-pc-windows-msvc

      - name: Initialize MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dioxus CLI
        if: steps.meta.outputs.build_msi == 'true'
        run: cargo install dioxus-cli --locked

      - name: Prepare bundle resources
        if: steps.meta.outputs.build_msi == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Create icon from base64
          $iconBase64 = ""
          $iconBytes = [Convert]::FromBase64String($iconBase64)

          # Create icons directory and save icon
          foreach ($iconPath in @("icons/icon.ico", "app/icons/icon.ico")) {
            $iconDir = Split-Path -Parent $iconPath
            if (-not (Test-Path $iconDir)) {
              New-Item -ItemType Directory -Path $iconDir -Force | Out-Null
            }

            if (-not (Test-Path $iconPath)) {
              [System.IO.File]::WriteAllBytes($iconPath, $iconBytes)
            }
          }

      - name: Build MSI Package
        if: steps.meta.outputs.build_msi == 'true'
        run: dx bundle --release --platform desktop --package app --features bundle --package-types msi

      - name: Build EXE Binary
        if: steps.meta.outputs.build_exe == 'true'
        run: cargo build --release -p app --features bundle

      - name: Prepare Windows release assets
        if: steps.meta.outputs.release_tag != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item target/release/app.exe release-assets/shovel-windows-x86_64.exe
          if (Test-Path target/release/app.pdb) {
            Copy-Item target/release/app.pdb release-assets/shovel-windows-x86_64.pdb
          }

      - name: Upload MSI Artifact
        if: steps.meta.outputs.build_msi == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-msi
          path: |
            dist/**/*.msi
            target/dx/**/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload EXE Artifact
        if: steps.meta.outputs.build_exe == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-exe
          path: |
            target/release/app.exe
            target/release/app.pdb
          if-no-files-found: error
          retention-days: 30

      - name: Publish Windows release assets
        if: steps.meta.outputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          files: |
            release-assets/shovel-windows-x86_64.exe
            release-assets/shovel-windows-x86_64.pdb
