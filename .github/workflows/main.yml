name: Build Windows MSI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Prepare bundle resources
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $iconBase64 = ""
          $iconBytes = [Convert]::FromBase64String($iconBase64)

          foreach ($iconPath in @("icons/icon.ico", "app/icons/icon.ico")) {
            $iconDir = Split-Path -Parent $iconPath
            if (-not (Test-Path $iconDir)) {
              New-Item -ItemType Directory -Path $iconDir -Force | Out-Null
            }

            if (-not (Test-Path $iconPath)) {
              [System.IO.File]::WriteAllBytes($iconPath, $iconBytes)
            }
          }

          New-Item -ItemType Directory -Path "app/ui/assets" -Force | Out-Null
          Copy-Item -Path "ui/assets/*" -Destination "app/ui/assets" -Recurse -Force

          New-Item -ItemType Directory -Path "app/assets" -Force | Out-Null
          if (Test-Path "assets") {
            $assetFiles = Get-ChildItem -Path "assets" -Recurse -File -ErrorAction SilentlyContinue
            if ($assetFiles.Count -gt 0) {
              Copy-Item -Path "assets/*" -Destination "app/assets" -Recurse -Force
            } else {
              Set-Content -Path "app/assets/bundle-placeholder.txt" -Value "Placeholder bundle asset for CI."
            }
          } else {
            Set-Content -Path "app/assets/bundle-placeholder.txt" -Value "Placeholder bundle asset for CI."
          }

          $webViewLoaderCandidates = @(
            "libs/WebView2Loader.dll",
            "dist/x86_64-pc-windows-gnu/release/WebView2Loader.dll"
          )
          $webViewLoader = $webViewLoaderCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $webViewLoader) {
            throw "WebView2Loader.dll not found in any expected location."
          }

          New-Item -ItemType Directory -Path "app/libs" -Force | Out-Null
          Copy-Item -Path $webViewLoader -Destination "app/libs/WebView2Loader.dll" -Force

      - name: Build and Bundle MSI
        run: dx bundle --release --platform desktop --package app --features bundle --package-types msi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/**/*.msi
            target/dx/**/*.msi
          if-no-files-found: error
