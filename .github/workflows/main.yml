name: Build Windows MSI

on:
  push:
    branches: [ main, master ] # Сборка будет запускаться при пуше в эти ветки
  workflow_dispatch: # Позволяет запустить сборку вручную кнопкой в GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Ensure Windows bundle icon exists
        shell: pwsh
        run: |
          $iconBase64 = ""
          $iconBytes = [Convert]::FromBase64String($iconBase64)

          foreach ($iconPath in @("icons/icon.ico", "app/icons/icon.ico")) {
            $iconDir = Split-Path -Parent $iconPath
            if (-not (Test-Path $iconDir)) {
              New-Item -ItemType Directory -Path $iconDir -Force | Out-Null
            }

            if (-not (Test-Path $iconPath)) {
              [System.IO.File]::WriteAllBytes($iconPath, $iconBytes)
            }
          }

      - name: Build and Bundle MSI
        run: dx bundle --release --platform desktop --package app --features bundle --package-types msi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/**/*.msi
            target/dx/**/*.msi
          if-no-files-found: error
