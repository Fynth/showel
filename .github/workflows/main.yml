name: Build Windows Packages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      package_type:
        description: 'Package type to build'
        required: true
        default: 'msi'
        type: choice
        options:
          - msi
          - exe
          - both

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          default-host: x86_64-pc-windows-msvc

      - name: Initialize MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Prepare bundle resources
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Create icon from base64
          $iconBase64 = ""
          $iconBytes = [Convert]::FromBase64String($iconBase64)

          # Create icons directory and save icon
          foreach ($iconPath in @("icons/icon.ico", "app/icons/icon.ico")) {
            $iconDir = Split-Path -Parent $iconPath
            if (-not (Test-Path $iconDir)) {
              New-Item -ItemType Directory -Path $iconDir -Force | Out-Null
            }

            if (-not (Test-Path $iconPath)) {
              [System.IO.File]::WriteAllBytes($iconPath, $iconBytes)
            }
          }

          # Prepare UI assets
          if (Test-Path "ui/assets") {
            New-Item -ItemType Directory -Path "app/assets" -Force | Out-Null
            Copy-Item -Path "ui/assets/*" -Destination "app/assets" -Recurse -Force
          }

      - name: Build MSI Package
        if: github.event.inputs.package_type == 'msi' || github.event.inputs.package_type == 'both' || github.event_name == 'push'
        run: dx bundle --release --platform desktop --package app --features bundle --package-types msi

      - name: Build EXE Package
        if: github.event.inputs.package_type == 'exe' || github.event.inputs.package_type == 'both'
        run: dx bundle --release --platform desktop --package app --features bundle --package-types exe

      - name: Upload MSI Artifact
        if: github.event.inputs.package_type == 'msi' || github.event.inputs.package_type == 'both' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-msi
          path: |
            dist/**/*.msi
            target/dx/**/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload EXE Artifact
        if: github.event.inputs.package_type == 'exe' || github.event.inputs.package_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-exe
          path: |
            dist/**/*.exe
            target/dx/**/*.exe
          if-no-files-found: error
          retention-days: 30
