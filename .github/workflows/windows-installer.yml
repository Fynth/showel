name: windows-installer

on:
  workflow_dispatch:
    inputs:
      package_type:
        description: "Installer type"
        required: true
        default: "exe"
        type: choice
        options:
          - exe
          - msi

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked --force

      - name: Build installer
        run: dx bundle --platform desktop --release --features bundle --package-types ${{ github.event.inputs.package_type }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: showel-windows-${{ github.event.inputs.package_type }}
          path: |
            dist/**/*.exe
            dist/**/*.msi
            target/dx/**/*.exe
            target/dx/**/*.msi
