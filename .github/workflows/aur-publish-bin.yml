name: Publish AUR Binary Package

on:
  workflow_run:
    workflows:
      - Build Linux Desktop
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v'
        required: true
        type: string

concurrency:
  group: aur-publish-bin-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  publish-aur-bin:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'release'
        )
      )
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout code for triggering workflow
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout code
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release metadata artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: showel-release-metadata
          path: ${{ runner.temp }}/release-metadata

      - name: Install AUR publish dependencies
        shell: bash
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm git openssh curl

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
            tag_name="${version}"
          else
            source "${RUNNER_TEMP}/release-metadata/version.env"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Prepare non-root AUR user
        shell: bash
        run: |
          set -euo pipefail
          if ! id -u builder >/dev/null 2>&1; then
            useradd --create-home builder
          fi
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Render AUR binary package files
        env:
          SHOWEL_BINARY_ASSET_WAIT_SECONDS: 300
          SHOWEL_BINARY_ASSET_WAIT_INTERVAL: 10
        shell: bash
        run: |
          set -euo pipefail
          binary_dir="${GITHUB_WORKSPACE}/packaging/aur/generated-showel-bin"
          su builder -c "cd '${GITHUB_WORKSPACE}' && SHOWEL_TAG_OVERRIDE='${{ steps.meta.outputs.tag_name }}' SHOWEL_BINARY_ASSET_WAIT_SECONDS='${SHOWEL_BINARY_ASSET_WAIT_SECONDS}' SHOWEL_BINARY_ASSET_WAIT_INTERVAL='${SHOWEL_BINARY_ASSET_WAIT_INTERVAL}' ./scripts/render-aur-binary-package.sh '${{ steps.meta.outputs.version }}' '${{ github.repository_owner }}' '${{ github.event.repository.name }}' '${binary_dir}' && bash ./scripts/update-aur-srcinfo.sh '${binary_dir}'"

      - name: Configure SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "AUR_SSH_PRIVATE_KEY secret is not configured" >&2
            exit 1
          fi

          ssh_dir="${RUNNER_TEMP}/aur-ssh"
          install -d -m 700 "${ssh_dir}"
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > "${ssh_dir}/aur"
          tr -d '\r' < "${ssh_dir}/aur" > "${ssh_dir}/aur.normalized"
          mv "${ssh_dir}/aur.normalized" "${ssh_dir}/aur"
          chmod 600 "${ssh_dir}/aur"
          ssh-keygen -yf "${ssh_dir}/aur" > /dev/null
          ssh-keyscan -H -t rsa,ecdsa,ed25519 aur.archlinux.org > "${ssh_dir}/known_hosts" 2>/dev/null
          chmod 644 "${ssh_dir}/known_hosts"

      - name: Verify SSH connectivity to AUR
        shell: bash
        run: |
          set -euo pipefail

          ssh_dir="${RUNNER_TEMP}/aur-ssh"
          export GIT_SSH_COMMAND="ssh -i ${ssh_dir}/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${ssh_dir}/known_hosts"
          ssh -i "${ssh_dir}/aur" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${ssh_dir}/known_hosts" \
            aur@aur.archlinux.org help

      - name: Push binary package to AUR
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          ssh_dir="${RUNNER_TEMP}/aur-ssh"
          export GIT_SSH_COMMAND="ssh -i ${ssh_dir}/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${ssh_dir}/known_hosts"
          ./scripts/publish-aur-package.sh \
            "showel-bin" \
            "${GITHUB_WORKSPACE}/packaging/aur/generated-showel-bin" \
            "${VERSION}"
