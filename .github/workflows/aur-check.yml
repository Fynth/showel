name: Validate AUR Package

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/aur-check.yml'
      - '.github/workflows/aur-publish.yml'
      - '.github/workflows/aur-publish-bin.yml'
      - 'packaging/aur/**'
      - 'packaging/arch/showel.desktop'
      - 'scripts/publish-aur-package.sh'
      - 'scripts/resolve-release-tag.sh'
      - 'scripts/resolve-pkgrel.sh'
      - 'scripts/render-aur-binary-package.sh'
      - 'scripts/render-aur-release-package.sh'
      - 'scripts/update-aur-srcinfo.sh'
      - 'app/Cargo.toml'
  pull_request:
    paths:
      - '.github/workflows/aur-check.yml'
      - '.github/workflows/aur-publish.yml'
      - '.github/workflows/aur-publish-bin.yml'
      - 'packaging/aur/**'
      - 'packaging/arch/showel.desktop'
      - 'scripts/publish-aur-package.sh'
      - 'scripts/resolve-release-tag.sh'
      - 'scripts/resolve-pkgrel.sh'
      - 'scripts/render-aur-binary-package.sh'
      - 'scripts/render-aur-release-package.sh'
      - 'scripts/update-aur-srcinfo.sh'
      - 'app/Cargo.toml'

concurrency:
  group: aur-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AUR metadata tooling
        shell: bash
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm git

      - name: Prepare non-root AUR build user
        shell: bash
        run: |
          set -euo pipefail
          if ! id -u builder >/dev/null 2>&1; then
            useradd --create-home builder
          fi
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Regenerate .SRCINFO in temp directory
        shell: bash
        run: |
          set -euo pipefail
          temp_dir="${RUNNER_TEMP}/aur-check-showel-git"
          rm -rf "${temp_dir}"
          install -d -m 755 "${temp_dir}"
          cp "${GITHUB_WORKSPACE}/packaging/aur/showel-git/PKGBUILD" "${temp_dir}/PKGBUILD"
          chown -R builder:builder "${temp_dir}"
          su builder -c "cd '${GITHUB_WORKSPACE}' && bash ./scripts/update-aur-srcinfo.sh '${temp_dir}'"

      - name: Verify tracked .SRCINFO
        shell: bash
        run: |
          set -euo pipefail
          diff -u \
            "${GITHUB_WORKSPACE}/packaging/aur/showel-git/.SRCINFO" \
            "${RUNNER_TEMP}/aur-check-showel-git/.SRCINFO"

      - name: Render stable AUR package metadata
        shell: bash
        run: |
          set -euo pipefail
          dummy_sha="$(printf '0%.0s' {1..64})"
          output_dir="${GITHUB_WORKSPACE}/packaging/aur/generated-showel"
          su builder -c "cd '${GITHUB_WORKSPACE}' && ./scripts/render-aur-release-package.sh '0.0.0' '${{ github.repository_owner }}' '${{ github.event.repository.name }}' '${output_dir}' '${dummy_sha}' && bash ./scripts/update-aur-srcinfo.sh '${output_dir}'"

          test -s "${output_dir}/PKGBUILD"
          test -s "${output_dir}/.SRCINFO"

      - name: Render binary AUR package metadata
        shell: bash
        run: |
          set -euo pipefail
          dummy_sha="$(printf 'f%.0s' {1..64})"
          output_dir="${GITHUB_WORKSPACE}/packaging/aur/generated-showel-bin"
          su builder -c "cd '${GITHUB_WORKSPACE}' && ./scripts/render-aur-binary-package.sh '0.0.0' '${{ github.repository_owner }}' '${{ github.event.repository.name }}' '${output_dir}' '${dummy_sha}' && bash ./scripts/update-aur-srcinfo.sh '${output_dir}'"

          test -s "${output_dir}/PKGBUILD"
          test -s "${output_dir}/.SRCINFO"
