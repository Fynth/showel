name: Build Linux Desktop

on:
  release:
    types:
      - published
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to upload assets into; optional'
        required: false
        type: string

concurrency:
  group: linux-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.ref }}

      - name: Resolve workflow metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag=""
          version=""

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
            version="${release_tag#v}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
            version="${release_tag#v}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Build Linux release binary
        run: cargo build --locked --release -p app --features desktop

      - name: Assemble Linux archive
        run: |
          rm -rf bundle
          mkdir -p bundle/bin
          mkdir -p bundle/lib/showel/assets
          mkdir -p bundle/share/applications
          mkdir -p bundle/share/icons/hicolor/scalable/apps
          cp target/release/app bundle/bin/showel
          cp app/assets/app.css bundle/lib/showel/assets/app.css
          cp packaging/arch/showel.desktop bundle/share/applications/showel.desktop
          cp app/assets/icon.svg bundle/share/icons/hicolor/scalable/apps/showel.svg
          cp README.md bundle/README.md
          tar -C bundle -czf showel-linux-x86_64.tar.gz .

      - name: Write release metadata
        if: steps.meta.outputs.release_tag != ''
        run: |
          set -euo pipefail
          mkdir -p release-metadata
          printf 'version=%s\n' "${{ steps.meta.outputs.version }}" > release-metadata/version.env
          printf 'tag_name=%s\n' "${{ steps.meta.outputs.release_tag }}" >> release-metadata/version.env

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: showel-linux-x86_64
          path: showel-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux release metadata artifact
        if: steps.meta.outputs.release_tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: showel-release-metadata
          path: release-metadata/version.env
          if-no-files-found: error
          retention-days: 7

      - name: Publish Linux release assets
        if: steps.meta.outputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          files: |
            showel-linux-x86_64.tar.gz
