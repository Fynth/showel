name: Build Linux Desktop

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev

      - name: Build Linux release binary
        run: cargo build --locked --release -p app --features desktop

      - name: Assemble Linux archive
        run: |
          rm -rf bundle
          mkdir -p bundle/bin
          mkdir -p bundle/share/applications
          mkdir -p bundle/share/icons/hicolor/scalable/apps
          cp target/release/app bundle/bin/showel
          cp packaging/arch/showel.desktop bundle/share/applications/showel.desktop
          cp app/assets/icon.svg bundle/share/icons/hicolor/scalable/apps/showel.svg
          cp README.md bundle/README.md
          tar -C bundle -czf showel-linux-x86_64.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: showel-linux-x86_64
          path: showel-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Publish Linux release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            showel-linux-x86_64.tar.gz
